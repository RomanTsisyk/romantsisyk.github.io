<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: dark navy with subtle blue hint top-left -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1535;stop-opacity:1" />
      <stop offset="55%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060916;stop-opacity:1" />
    </linearGradient>

    <!-- Top-left accent glow -->
    <radialGradient id="glowTL" cx="0%" cy="0%" r="70%" fx="0%" fy="0%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#007AFF;stop-opacity:0" />
    </radialGradient>

    <!-- Bottom-right secondary glow -->
    <radialGradient id="glowBR" cx="100%" cy="100%" r="55%" fx="100%" fy="100%">
      <stop offset="0%" style="stop-color:#5E34D4;stop-opacity:0.14" />
      <stop offset="100%" style="stop-color:#5E34D4;stop-opacity:0" />
    </radialGradient>

    <!-- Accent bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#5E34D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5E34D4;stop-opacity:0" />
    </linearGradient>

    <!-- Android icon gradient -->
    <linearGradient id="androidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#5E34D4;stop-opacity:0.9" />
    </linearGradient>

    <!-- Grid pattern for subtle texture -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>

    <!-- Drop shadow filter for text -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow filter for the Android icon -->
    <filter id="iconGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUNDS ── -->
  <!-- Base dark navy -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Top-left blue glow -->
  <rect width="1200" height="630" fill="url(#glowTL)"/>
  <!-- Bottom-right purple glow -->
  <rect width="1200" height="630" fill="url(#glowBR)"/>

  <!-- ── DECORATIVE GEOMETRIC ELEMENTS ── -->

  <!-- Large faint circle ring, top-right -->
  <circle cx="1080" cy="120" r="180" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.12"/>
  <circle cx="1080" cy="120" r="130" fill="none" stroke="#007AFF" stroke-width="0.6" opacity="0.08"/>
  <circle cx="1080" cy="120" r="80" fill="none" stroke="#5E34D4" stroke-width="0.6" opacity="0.10"/>

  <!-- Medium faint circle, bottom-left -->
  <circle cx="80" cy="560" r="100" fill="none" stroke="#5E34D4" stroke-width="1" opacity="0.10"/>
  <circle cx="80" cy="560" r="60" fill="none" stroke="#007AFF" stroke-width="0.6" opacity="0.08"/>

  <!-- Diagonal accent lines, top-right corner -->
  <line x1="980" y1="0" x2="1200" y2="220" stroke="#007AFF" stroke-width="0.8" opacity="0.10"/>
  <line x1="1040" y1="0" x2="1200" y2="160" stroke="#5E34D4" stroke-width="0.6" opacity="0.07"/>

  <!-- ── ANDROID ROBOT ICON (top-right, decorative) ── -->
  <!-- Positioned at top-right, ~100px wide, semi-transparent -->
  <g transform="translate(1055, 32)" opacity="0.55" filter="url(#iconGlow)">
    <!-- Body -->
    <rect x="8" y="42" width="74" height="52" rx="6" fill="url(#androidGrad)"/>
    <!-- Head -->
    <rect x="18" y="14" width="54" height="32" rx="16" fill="url(#androidGrad)"/>
    <!-- Antenna left -->
    <line x1="28" y1="14" x2="18" y2="4" stroke="url(#androidGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Antenna right -->
    <line x1="62" y1="14" x2="72" y2="4" stroke="url(#androidGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="35" cy="30" r="4" fill="#ffffff" opacity="0.95"/>
    <circle cx="55" cy="30" r="4" fill="#ffffff" opacity="0.95"/>
    <!-- Arm left -->
    <rect x="0" y="44" width="8" height="32" rx="4" fill="url(#androidGrad)"/>
    <!-- Arm right -->
    <rect x="82" y="44" width="8" height="32" rx="4" fill="url(#androidGrad)"/>
    <!-- Leg left -->
    <rect x="18" y="94" width="18" height="24" rx="6" fill="url(#androidGrad)"/>
    <!-- Leg right -->
    <rect x="54" y="94" width="18" height="24" rx="6" fill="url(#androidGrad)"/>
  </g>

  <!-- ── LEFT ACCENT BAR ── -->
  <rect x="64" y="130" width="5" height="220" rx="2.5" fill="url(#barGrad)" opacity="0.9"/>

  <!-- ── MAIN CONTENT ── -->

  <!-- "Roman Tsisyk" — large white bold name -->
  <text
    x="92"
    y="218"
    font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="78"
    font-weight="700"
    letter-spacing="-1"
    fill="#FFFFFF"
    filter="url(#textShadow)"
  >Roman Tsisyk</text>

  <!-- Job title — accent blue -->
  <text
    x="94"
    y="276"
    font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="500"
    letter-spacing="0.5"
    fill="#007AFF"
  >Senior Android Developer</text>

  <!-- Thin divider line -->
  <rect x="92" y="302" width="520" height="1.5" rx="0.75" fill="#ffffff" opacity="0.12"/>

  <!-- Stats row — gray ~24px -->
  <text
    x="92"
    y="344"
    font-family="'SF Pro Text', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#8A95B0"
    letter-spacing="0.2"
  >12+ Years Experience</text>

  <!-- Dot separator 1 -->
  <circle cx="318" cy="334" r="3" fill="#007AFF" opacity="0.7"/>

  <text
    x="332"
    y="344"
    font-family="'SF Pro Text', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#8A95B0"
    letter-spacing="0.2"
  >500K+ Users</text>

  <!-- Dot separator 2 -->
  <circle cx="490" cy="334" r="3" fill="#007AFF" opacity="0.7"/>

  <text
    x="504"
    y="344"
    font-family="'SF Pro Text', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#8A95B0"
    letter-spacing="0.2"
  >Kotlin &amp; Jetpack Compose</text>

  <!-- ── TAG PILLS ── -->
  <!-- Kotlin pill -->
  <rect x="92" y="380" width="100" height="32" rx="16" fill="#007AFF" opacity="0.15"/>
  <rect x="92" y="380" width="100" height="32" rx="16" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.4"/>
  <text x="142" y="401" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#007AFF" text-anchor="middle" opacity="0.9">Kotlin</text>

  <!-- Android pill -->
  <rect x="204" y="380" width="108" height="32" rx="16" fill="#3DDC84" opacity="0.10"/>
  <rect x="204" y="380" width="108" height="32" rx="16" fill="none" stroke="#3DDC84" stroke-width="1" opacity="0.35"/>
  <text x="258" y="401" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#3DDC84" text-anchor="middle" opacity="0.85">Android</text>

  <!-- Compose pill -->
  <rect x="324" y="380" width="128" height="32" rx="16" fill="#5E34D4" opacity="0.15"/>
  <rect x="324" y="380" width="128" height="32" rx="16" fill="none" stroke="#5E34D4" stroke-width="1" opacity="0.4"/>
  <text x="388" y="401" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#A78BFA" text-anchor="middle" opacity="0.9">Jetpack Compose</text>

  <!-- MVVM pill -->
  <rect x="464" y="380" width="86" height="32" rx="16" fill="#007AFF" opacity="0.10"/>
  <rect x="464" y="380" width="86" height="32" rx="16" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.3"/>
  <text x="507" y="401" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#8A95B0" text-anchor="middle" opacity="0.85">MVVM</text>

  <!-- ── BOTTOM BAR ── -->
  <!-- Separator line -->
  <rect x="0" y="548" width="1200" height="1" fill="#ffffff" opacity="0.08"/>

  <!-- Bottom bar background tint -->
  <rect x="0" y="549" width="1200" height="81" fill="#060916" opacity="0.5"/>

  <!-- GitHub icon (SVG path, minimal) -->
  <g transform="translate(64, 572)" fill="#8A95B0" opacity="0.75">
    <path d="M18 0C8.06 0 0 8.28 0 18.5c0 8.17 5.15 15.1 12.3 17.55.9.17 1.23-.4 1.23-.88 0-.43-.02-1.86-.02-3.38-4.53.86-5.73-1.15-6.1-2.2-.2-.53-.88-2.2-1.5-2.64-.51-.28-1.24-.97-.02-1 1.14-.02 1.96.87 2.23 1.23 1.3 2.27 3.38 1.63 4.22 1.24.13-.97.5-1.63.91-2-.9-.87-4.38-1.2-4.38-5.33 0-1.18.41-2.14 1.08-2.9-.11-.1-.49-1.38.1-2.87 0 0 .89-.29 2.9 1.12A9.85 9.85 0 0 1 18 8.8c.9.01 1.8.13 2.65.38 2.01-1.42 2.9-1.12 2.9-1.12.59 1.49.22 2.77.11 2.87.67.76 1.08 1.71 1.08 2.9 0 4.14-2.49 4.46-4.38 5.33.35.31.65.92.65 1.86 0 1.34-.01 2.43-.01 2.76 0 .48.33 1.06 1.24.88C30.87 33.6 36 26.65 36 18.5 36 8.28 27.94 0 18 0Z" fill-rule="evenodd"/>
  </g>

  <!-- Website URL -->
  <text
    x="112"
    y="593"
    font-family="'SF Pro Text', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="500"
    fill="#8A95B0"
    opacity="0.9"
    letter-spacing="0.3"
  >roman-tsisyk.com</text>

  <!-- Right side: "Available for projects" subtle badge -->
  <rect x="960" y="560" width="200" height="36" rx="18" fill="#007AFF" opacity="0.12"/>
  <rect x="960" y="560" width="200" height="36" rx="18" fill="none" stroke="#007AFF" stroke-width="1" opacity="0.3"/>
  <!-- Green dot indicator -->
  <circle cx="980" cy="578" r="5" fill="#3DDC84" opacity="0.85"/>
  <text x="992" y="584" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#8A95B0" opacity="0.85">Available for projects</text>

  <!-- ── BOTTOM ACCENT GRADIENT LINE ── -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#barGrad)" opacity="0.8"/>
</svg>
