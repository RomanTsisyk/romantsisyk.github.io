<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found | Roman Tsisyk</title>
    <meta name="description" content="The page you're looking for doesn't exist or has been moved. Head back to Roman Tsisyk's Android developer portfolio.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://roman-tsisyk.com/404.html">
    <meta name="author" content="Roman Tsisyk">
    <meta name="theme-color" content="#0A0E27">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://roman-tsisyk.com/404.html">
    <meta property="og:title" content="404 – Page Not Found | Roman Tsisyk">
    <meta property="og:description" content="The page you're looking for doesn't exist or has been moved.">
    <meta property="og:site_name" content="Roman Tsisyk Portfolio">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">

    <style>
        /* ─── Reset & Base ─── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg:         #0A0E27;
            --bg-card:    #111530;
            --bg-glass:   rgba(17, 21, 48, 0.80);
            --accent:     #007AFF;
            --accent-glow:#0055CC;
            --accent2:    #34C759;
            --white:      #FFFFFF;
            --muted:      #8E8EA0;
            --border:     rgba(0, 122, 255, 0.18);
            --font-sans:  'Inter', system-ui, -apple-system, sans-serif;
            --font-mono:  'JetBrains Mono', 'Courier New', monospace;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-sans);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* ─── Animated grid background ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 122, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 122, 255, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── Ambient glows ─── */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.28;
        }
        .glow-orb--blue {
            width: 560px; height: 560px;
            background: #007AFF;
            top: -180px; right: -160px;
            animation: floatOrb 14s ease-in-out infinite alternate;
        }
        .glow-orb--indigo {
            width: 420px; height: 420px;
            background: #5856D6;
            bottom: -140px; left: -120px;
            animation: floatOrb 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatOrb {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.06); }
        }

        /* ─── Main card ─── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem 3.5rem;
            max-width: 680px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(0, 122, 255, 0.08),
                0 32px 80px rgba(0, 0, 0, 0.45),
                0 0 80px rgba(0, 122, 255, 0.06);
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ─── Android Robot ─── */
        .robot-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 1.75rem;
        }

        .robot {
            position: relative;
            width: 120px;
            height: 130px;
            animation: robotFloat 4s ease-in-out infinite;
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        /* Antennae */
        .robot__antenna-l,
        .robot__antenna-r {
            position: absolute;
            top: 0;
            width: 3px;
            height: 16px;
            background: var(--accent2);
            border-radius: 3px 3px 0 0;
        }
        .robot__antenna-l { left: 30px; transform: rotate(-18deg); transform-origin: bottom center; }
        .robot__antenna-r { right: 30px; transform: rotate(18deg);  transform-origin: bottom center; }

        .robot__antenna-l::before,
        .robot__antenna-r::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px; height: 7px;
            background: var(--accent2);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent2);
        }

        /* Head */
        .robot__head {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 72px; height: 52px;
            background: var(--accent2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .robot__eye {
            width: 10px; height: 10px;
            background: var(--bg);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        /* Blinking animation */
        .robot__eye::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--bg);
            border-radius: 50%;
            animation: blink 5s ease-in-out infinite;
            transform: scaleY(0);
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(0); }
            92%, 98%      { transform: scaleY(1); }
        }

        /* Body */
        .robot__body {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 50px;
            background: var(--accent2);
            border-radius: 10px;
        }

        /* Chest indicator */
        .robot__body::after {
            content: '?';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 800;
            color: var(--bg);
            font-family: var(--font-mono);
        }

        /* Arms */
        .robot__arm-l,
        .robot__arm-r {
            position: absolute;
            top: 74px;
            width: 14px; height: 44px;
            background: var(--accent2);
            border-radius: 7px;
        }
        .robot__arm-l {
            left: 14px;
            transform-origin: top center;
            animation: armWave 2.8s ease-in-out infinite;
        }
        .robot__arm-r {
            right: 14px;
            transform-origin: top center;
            animation: armWave 2.8s ease-in-out infinite reverse;
        }

        @keyframes armWave {
            0%, 100% { transform: rotate(0deg); }
            25%      { transform: rotate(-20deg); }
            75%      { transform: rotate(20deg); }
        }

        /* Legs */
        .robot__leg-l,
        .robot__leg-r {
            position: absolute;
            bottom: 0;
            width: 18px; height: 28px;
            background: var(--accent2);
            border-radius: 0 0 8px 8px;
        }
        .robot__leg-l { left: 28px; }
        .robot__leg-r { right: 28px; }

        /* ─── 404 Headline ─── */
        .headline-404 {
            font-size: clamp(6rem, 18vw, 9rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -4px;
            background: linear-gradient(135deg, #FFFFFF 0%, #007AFF 50%, #5856D6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            font-variant-numeric: tabular-nums;
            animation: numPulse 6s ease-in-out infinite alternate;
        }

        @keyframes numPulse {
            from { filter: drop-shadow(0 0 24px rgba(0, 122, 255, 0.35)); }
            to   { filter: drop-shadow(0 0 48px rgba(0, 122, 255, 0.65)); }
        }

        /* ─── Status badge ─── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 122, 255, 0.12);
            border: 1px solid rgba(0, 122, 255, 0.30);
            border-radius: 999px;
            padding: 4px 14px;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }
        .status-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: ping 1.8s ease-in-out infinite;
        }
        @keyframes ping {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(1.4); }
        }

        /* ─── Text ─── */
        .title {
            font-size: clamp(1.4rem, 4vw, 1.9rem);
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.75rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.65;
            max-width: 420px;
            margin: 0 auto 2rem;
        }

        /* ─── Navigation links ─── */
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.85rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.65rem 1.5rem;
            border-radius: 10px;
            font-size: 0.93rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            cursor: pointer;
        }

        .btn--primary {
            background: var(--accent);
            color: var(--white);
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.35);
        }
        .btn--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 122, 255, 0.55);
            background: #0066DC;
        }

        .btn--ghost {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--border);
        }
        .btn--ghost:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 122, 255, 0.5);
            background: rgba(0, 122, 255, 0.08);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.15);
        }

        /* Icon glyphs (inline SVG via background + mask trick avoids external deps) */
        .icon {
            display: inline-block;
            width: 16px; height: 16px;
            flex-shrink: 0;
        }

        /* ─── Countdown ─── */
        .countdown-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.84rem;
            color: var(--muted);
            font-family: var(--font-mono);
            margin-bottom: 2.5rem;
        }

        #countdown-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px; height: 26px;
            border-radius: 6px;
            background: rgba(0, 122, 255, 0.14);
            border: 1px solid rgba(0, 122, 255, 0.25);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.2s ease;
        }

        #cancel-redirect {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: var(--font-sans);
            text-decoration: underline;
            padding: 0;
            opacity: 0.75;
            transition: opacity 0.15s;
        }
        #cancel-redirect:hover { opacity: 1; }

        .redirect-cancelled {
            color: var(--muted);
            font-size: 0.82rem;
            font-family: var(--font-mono);
        }

        /* ─── Divider ─── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0 -1rem 1.75rem;
        }

        /* ─── Footer ─── */
        .footer {
            position: relative;
            z-index: 1;
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: 2.5rem;
            text-align: center;
        }

        .footer a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer a:hover { color: var(--accent); }

        /* ─── Code path decoration ─── */
        .code-path {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: rgba(0, 122, 255, 0.5);
            margin-bottom: 1.5rem;
            word-break: break-all;
        }
        .code-path span { color: rgba(0, 122, 255, 0.85); }

        /* ─── Responsive ─── */
        @media (max-width: 560px) {
            .card { padding: 2rem 1.5rem; border-radius: 18px; }
            .headline-404 { letter-spacing: -2px; }
            .nav-links { gap: 0.65rem; }
            .btn { padding: 0.6rem 1.1rem; font-size: 0.88rem; }
        }

        /* ─── Reduced motion ─── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient glows -->
    <div class="glow-orb glow-orb--blue" aria-hidden="true"></div>
    <div class="glow-orb glow-orb--indigo" aria-hidden="true"></div>

    <main class="card" role="main">

        <!-- Android-themed lost robot -->
        <div class="robot-wrap" aria-hidden="true">
            <div class="robot">
                <div class="robot__antenna-l"></div>
                <div class="robot__antenna-r"></div>
                <div class="robot__head">
                    <div class="robot__eye"></div>
                    <div class="robot__eye"></div>
                </div>
                <div class="robot__arm-l"></div>
                <div class="robot__arm-r"></div>
                <div class="robot__body"></div>
                <div class="robot__leg-l"></div>
                <div class="robot__leg-r"></div>
            </div>
        </div>

        <!-- Status badge -->
        <div class="status-badge" aria-label="HTTP status 404">HTTP 404</div>

        <!-- Big number -->
        <div class="headline-404" aria-label="Error 404">404</div>

        <!-- Titles -->
        <h1 class="title">Page Not Found</h1>
        <p class="subtitle">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

        <!-- Current path display -->
        <p class="code-path" id="current-path" aria-live="polite"></p>

        <!-- Navigation -->
        <nav class="nav-links" aria-label="Recovery navigation">
            <a href="/" class="btn btn--primary">
                <svg class="icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M8 1L2 7h2v7h4v-4h2v4h4V7h2L8 1z" fill="currentColor"/>
                </svg>
                Go Home
            </a>
            <a href="/#projects" class="btn btn--ghost">
                <svg class="icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.9"/>
                    <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.7"/>
                    <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.7"/>
                    <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
                </svg>
                View Projects
            </a>
            <a href="/#contact" class="btn btn--ghost">
                <svg class="icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M14 3H2a1 1 0 00-1 1v8a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1zm-1.5 2L8 8.5 3.5 5h9z" fill="currentColor"/>
                </svg>
                Contact
            </a>
        </nav>

        <!-- Countdown -->
        <div class="countdown-wrap" id="countdown-container" aria-live="polite" aria-atomic="true">
            <span>Redirecting to home in</span>
            <span id="countdown-num">10</span>
            <span>s &mdash;</span>
            <button id="cancel-redirect" type="button" aria-label="Cancel redirect to home page">Cancel</button>
        </div>

        <div class="divider" aria-hidden="true"></div>

        <!-- Branding line -->
        <p style="font-size:0.82rem; color: var(--muted);">
            <a href="/" style="color:var(--accent); text-decoration:none; font-weight:600;">roman-tsisyk.com</a>
            &nbsp;&mdash;&nbsp;Senior Android Developer
        </p>

    </main>

    <footer class="footer" aria-label="Site footer">
        &copy; 2026 Roman Tsisyk &nbsp;&middot;&nbsp;
        <a href="/">Portfolio</a> &nbsp;&middot;&nbsp;
        <a href="/privacy.html">Privacy</a>
    </footer>

    <script>
        // ─── Show current path ───
        (function () {
            var el = document.getElementById('current-path');
            var path = window.location.pathname;
            if (path && path !== '/') {
                el.innerHTML = '// tried to reach: <span>' + path + '</span>';
            }
        }());

        // ─── Auto-redirect countdown ───
        (function () {
            var num     = document.getElementById('countdown-num');
            var btn     = document.getElementById('cancel-redirect');
            var wrap    = document.getElementById('countdown-container');
            var seconds = 10;
            var timer;

            function tick() {
                seconds -= 1;
                num.textContent = seconds;
                // Brief pop animation
                num.style.transform = 'scale(1.3)';
                setTimeout(function () { num.style.transform = 'scale(1)'; }, 180);

                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.replace('/');
                }
            }

            timer = setInterval(tick, 1000);

            btn.addEventListener('click', function () {
                clearInterval(timer);
                wrap.innerHTML = '<span class="redirect-cancelled">// redirect cancelled — you\'re staying here.</span>';
            });
        }());
    </script>

</body>
</html>
